services:
  - type: web
    name: alphareason-ai
    env: python
    buildCommand: mkdir -p static/css && npm install && npx tailwindcss -o static/css/tailwind.css --minify && pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_BASE_URL
        value: https://cloud.langfuse.com
      - key: PYTHON_VERSION
        value: 3.10.0
